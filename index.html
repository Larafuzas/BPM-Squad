<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPM Squad - Monitor de Pulso</title>
    
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="icon.ico">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a4b0be;
            --accent: #007bff;
            --danger: #dc3545;
            --warning: #f39c12;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; padding: 20px;
        }
        
        /* Controles Globales */
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-add { background-color: var(--warning); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px;}
        .btn-add:hover { background-color: #e67e22; }

        /* Pestañas */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px;}
        .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 10px 20px; border-radius: 8px 8px 0 0; transition: all 0.2s;}
        .tab-btn.active { color: white; background-color: var(--bg-card); font-weight: bold; border-bottom: 3px solid var(--accent);}
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Vista Monitor */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { 
            background-color: var(--bg-card); border-radius: 12px; padding: 20px; 
            text-align: center; border-top: 4px solid #555; position: relative;
        }
        
        /* Botón de Borrado de Tarjeta */
        .btn-delete {
            position: absolute; top: 10px; right: 10px;
            background: none; border: none; color: #555; font-size: 20px; cursor: pointer; padding: 5px;
        }
        .btn-delete:hover { color: var(--danger); }

        .sensor-name { 
            background: transparent; border: 1px dashed #555; color: white; 
            font-size: 20px; font-weight: bold; text-align: center; margin-bottom: 2px; 
            width: 80%; box-sizing: border-box; padding: 5px;
        }
        .sensor-name:focus { border-color: var(--accent); outline: none; background: #2a2a2a;}
        .internal-name { display: block; font-size: 11px; color: var(--text-muted); font-style: italic; margin-bottom: 10px; }
        
        .battery-display { color: var(--text-muted); font-size: 13px; margin-bottom: 5px; font-weight: 500;}
        .bpm-display { font-size: 64px; font-weight: bold; margin: 0 0 10px 0; }
        
        button.connect-btn { 
            background-color: var(--accent); color: white; border: none; padding: 10px 20px; 
            border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; transition: background-color 0.3s;
        }
        button.connect-btn:hover { background-color: #0056b3; }
        .chart-container { position: relative; height: 120px; width: 100%; }

        /* Vista Registro */
        .actions { margin-bottom: 20px; display: flex; gap: 10px;}
        .btn-export { background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;}
        .btn-export.pdf { background-color: var(--danger); }
        .combined-chart-wrapper { background-color: var(--bg-card); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        
        /* Tabla */
        table { width: 100%; border-collapse: collapse; background-color: var(--bg-card); border-radius: 12px; overflow: hidden;}
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #333; }
        th { background-color: #2a2a2a; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="header-controls">
        <div class="tabs" style="margin: 0; border: none; padding: 0;">
            <button class="tab-btn active" onclick="switchTab('monitor')">📡 Monitor en Vivo</button>
            <button class="tab-btn" onclick="switchTab('registro')">📊 Registro</button>
        </div>
        <button class="btn-add" onclick="addSensor()">➕ Añadir Sensor</button>
    </div>

    <div id="monitor" class="tab-content active">
        <div class="grid" id="sensor-grid">
            </div>
    </div>

    <div id="registro" class="tab-content">
        <div class="actions">
            <button class="btn-export pdf" onclick="exportPDF()">📄 Exportar PDF</button>
            <button class="btn-export" onclick="exportCSV()">🧮 Exportar CSV</button>
        </div>
        
        <div class="combined-chart-wrapper" id="pdf-export-area">
            <h3>BPM Squad - Comparativa de Sensores</h3>
            <div style="position: relative; height: 400px; width: 100%;">
                <canvas id="combinedChart"></canvas>
            </div>
        </div>

        <div style="max-height: 400px; overflow-y: auto; border-radius: 12px;">
            <table id="data-table">
                <thead>
                    <tr id="table-header-row">
                        <th>Hora</th>
                        </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- ESTADO GLOBAL Y CONFIGURACIÓN DINÁMICA ---
        const colorPalette = ["#FF5733", "#33A1FF", "#28B463", "#9B59B6", "#F1C40F", "#E67E22", "#E74C3C", "#1ABC9C"];
        let config = []; 
        let activeDevices = [];
        let individualCharts = [];
        let combinedChartObj = null;
        let globalTimeLabels = [];
        let globalData = []; 
        let sensorCount = 0;

        // --- INICIALIZACIÓN ---
        function initApp() {
            const ctxComb = document.getElementById('combinedChart').getContext('2d');
            combinedChartObj = new Chart(ctxComb, {
                type: 'line',
                data: { labels: globalTimeLabels, datasets: [] },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: { y: { suggestedMin: 0, suggestedMax: 180 } }
                }
            });

            addSensor();
            setInterval(recordGlobalData, 1000);
        }

        // --- FUNCIÓN PARA AÑADIR NUEVOS SENSORES ---
        function addSensor() {
            const index = sensorCount;
            const color = colorPalette[index % colorPalette.length];
            const defaultName = `Sensor ${index + 1}`;
            
            config.push({ id: index, name: defaultName, color: color, internalName: 'Desconectado', active: true });
            activeDevices.push(null);

            const grid = document.getElementById('sensor-grid');
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${index}`;
            card.style.borderColor = color;
            card.innerHTML = `
                <button class="btn-delete" onclick="removeSensor(${index})" title="Borrar sensor">✖</button>
                <input type="text" class="sensor-name" id="name-${index}" value="${defaultName}" onchange="updateNames()">
                <span class="internal-name" id="internal-${index}">Hardware: ---</span>
                <div class="battery-display" id="battery-${index}">🔋 --%</div>
                <div class="bpm-display" id="bpm-${index}" style="color: ${color}">0</div>
                <button class="connect-btn" id="btn-${index}" onclick="connectSensor(${index})">Conectar</button>
                <div class="chart-container">
                    <canvas id="chart-${index}"></canvas>
                </div>
            `;
            grid.appendChild(card);

            const ctx = document.getElementById(`chart-${index}`).getContext('2d');
            individualCharts[index] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{ label: 'BPM', data: [], borderColor: color, borderWidth: 2, tension: 0.4, pointRadius: 0 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    scales: { x: { display: false }, y: { min: 0, max: 200 } },
                    plugins: { legend: { display: false } }
                }
            });

            combinedChartObj.data.datasets.push({
                label: defaultName, data: [], borderColor: color, borderWidth: 2, tension: 0.4, pointRadius: 1, spanGaps: true, hidden: false
            });
            combinedChartObj.update();

            const trHead = document.getElementById('table-header-row');
            const th = document.createElement('th');
            th.id = `th-${index}`;
            th.innerText = defaultName;
            trHead.appendChild(th);

            sensorCount++;
        }

        // --- LÓGICA BLUETOOTH CON RECONEXIÓN ---
        async function connectSensor(index) {
            try {
                let device;
                // Si el dispositivo ya existe (se desconectó y estamos reconectando)
                if (activeDevices[index] && activeDevices[index].device) {
                    device = activeDevices[index].device;
                } else {
                    // Si es nuevo, pedimos permisos al usuario
                    device = await navigator.bluetooth.requestDevice({ 
                        filters: [{ services: ['heart_rate'] }],
                        optionalServices: ['battery_service']
                    });
                    
                    // Añadir detector de pérdida de señal
                    device.addEventListener('gattserverdisconnected', () => handleDisconnection(index));
                }
                
                const server = await device.gatt.connect();
                
                document.getElementById(`internal-${index}`).innerText = `HW: ${device.name || 'Genérico'}`;

                const hrService = await server.getPrimaryService('heart_rate');
                const hrChar = await hrService.getCharacteristic('heart_rate_measurement');
                await hrChar.startNotifications();
                hrChar.addEventListener('characteristicvaluechanged', (e) => handleData(e, index));

                try {
                    const batService = await server.getPrimaryService('battery_service');
                    const batChar = await batService.getCharacteristic('battery_level');
                    
                    const batVal = await batChar.readValue();
                    document.getElementById(`battery-${index}`).innerText = `🔋 ${batVal.getUint8(0)}%`;
                    
                    await batChar.startNotifications();
                    batChar.addEventListener('characteristicvaluechanged', (e) => {
                        document.getElementById(`battery-${index}`).innerText = `🔋 ${e.target.value.getUint8(0)}%`;
                    });
                } catch (batteryError) {
                    document.getElementById(`battery-${index}`).innerText = `🔋 N/A`;
                }

                // Guardar dispositivo incluyendo el timestamp de la última actualización
                activeDevices[index] = { device, currentBpm: 0, lastUpdate: Date.now() };
                
                const btn = document.getElementById(`btn-${index}`);
                btn.style.backgroundColor = "#28a745"; // Verde
                btn.innerText = "Conectado";

            } catch (error) {
                console.error("Error en la conexión:", error);
                alert("Conexión cancelada o fallida.");
            }
        }

        // --- GESTIÓN DE DESCONEXIONES ---
        function handleDisconnection(index) {
            if (!config[index] || !config[index].active) return; 
            
            console.log(`El sensor ${index} se ha desconectado físicamente.`);
            
            const btn = document.getElementById(`btn-${index}`);
            if (btn) {
                btn.style.backgroundColor = "var(--warning)"; // Naranja
                btn.innerText = "Reconectar";
            }
            
            const internalStr = document.getElementById(`internal-${index}`);
            if (internalStr) {
                internalStr.innerText = `HW: ${activeDevices[index].device.name || 'Genérico'} (Señal Perdida)`;
            }
        }

        function handleData(event, index) {
            const value = event.target.value;
            const flags = value.getUint8(0);
            const is16bit = flags & 0x01;
            const bpm = is16bit ? value.getUint16(1, true) : value.getUint8(1);
            
            if(activeDevices[index]) {
                activeDevices[index].currentBpm = bpm;
                activeDevices[index].lastUpdate = Date.now(); // Refrescar el watchdog
            }
        }

        // --- SISTEMA DE REGISTRO Y WATCHDOG ---
        function recordGlobalData() {
            const timeStr = new Date().toLocaleTimeString();
            let anyActive = false;
            let currentSnapshot = [];

            config.forEach((s, i) => {
                if (!s.active) return;
                anyActive = true;
                
                let bpm = 0;
                
                // Lógica de Watchdog: Si está conectado pero no hay señal en 3 segundos, poner a 0
                if (activeDevices[i]) {
                    if (Date.now() - activeDevices[i].lastUpdate > 3000) {
                        activeDevices[i].currentBpm = 0;
                    }
                    bpm = activeDevices[i].currentBpm;
                }

                // Actualizar número en pantalla
                document.getElementById(`bpm-${i}`).innerText = bpm;
                currentSnapshot.push(bpm);

                // Actualizar Gráfico Individual
                const iChart = individualCharts[i];
                iChart.data.labels.push('');
                iChart.data.datasets[0].data.push(bpm);
                if (iChart.data.labels.length > 30) {
                    iChart.data.labels.shift();
                    iChart.data.datasets[0].data.shift();
                }
                iChart.update();

                // Actualizar Gráfico Combinado
                combinedChartObj.data.datasets[i].data.push(bpm);
            });

            // Si no hay ningún sensor en la interfaz, no saturar la memoria
            if (!anyActive) return;

            globalTimeLabels.push(timeStr);
            globalData.push({ time: timeStr, bpm: currentSnapshot });
            combinedChartObj.update();

            // Generar fila dinámica para la tabla
            const tbody = document.getElementById('table-body');
            const tr = document.createElement('tr');
            let tdHtml = `<td>${timeStr}</td>`;
            config.forEach((s, i) => {
                if (s.active) {
                    tdHtml += `<td style="color:${s.color}">${currentSnapshot[i] || 0}</td>`;
                }
            });
            tr.innerHTML = tdHtml;
            tbody.prepend(tr);
        }

        // --- BORRAR SENSOR ---
        function removeSensor(index) {
            if(!confirm("¿Borrar este sensor? Se perderán sus datos actuales de visualización.")) return;
            
            config[index].active = false;
            
            // Eliminar tarjeta del DOM
            document.getElementById(`card-${index}`).remove();
            
            // Eliminar cabecera de la tabla
            const thElement = document.getElementById(`th-${index}`);
            if(thElement) thElement.remove();
            
            // Ocultar del gráfico combinado
            combinedChartObj.data.datasets[index].data = [];
            combinedChartObj.data.datasets[index].hidden = true;
            combinedChartObj.update();
            
            // Desconectar Bluetooth si estaba activo
            if(activeDevices[index] && activeDevices[index].device && activeDevices[index].device.gatt.connected) {
                activeDevices[index].device.gatt.disconnect();
            }
            activeDevices[index] = null;
        }

        // --- UTILIDADES ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function updateNames() {
            config.forEach((s, i) => {
                if(!s.active) return;
                const newName = document.getElementById(`name-${i}`).value;
                combinedChartObj.data.datasets[i].label = newName;
                document.getElementById(`th-${i}`).innerText = newName;
            });
            combinedChartObj.update();
        }

        // --- EXPORTACIÓN CON SOPORTE NATIVO (iOS / Bluefy) ---
        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const element = document.getElementById('pdf-export-area');
            const canvas = await html2canvas(element, { backgroundColor: '#1e1e1e' });
            
            const pdf = new jsPDF('landscape', 'mm', 'a4');
            pdf.text("BPM Squad - Reporte Comparativo", 10, 10);
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 20, 270, 150);
            
            const pdfBlob = pdf.output('blob');
            const file = new File([pdfBlob], "BPM_Squad_Report.pdf", { type: 'application/pdf' });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({
                    files: [file],
                    title: 'Reporte BPM Squad'
                }).catch(console.error);
            } else {
                pdf.save("BPM_Squad_Report.pdf");
            }
        }

        function exportCSV() {
            let csvContent = "Hora";
            
            // Cabeceras activas
            config.forEach((s, i) => {
                if(s.active) {
                    csvContent += `,${document.getElementById(`name-${i}`).value}`;
                }
            });
            csvContent += "\n";

            // Datos activos
            globalData.forEach(row => {
                let rowStr = row.time;
                config.forEach((s, i) => {
                    if(s.active) {
                        rowStr += `,${row.bpm[i] || 0}`;
                    }
                });
                csvContent += rowStr + "\n";
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const file = new File([blob], "BPM_Squad_Data.csv", { type: 'text/csv' });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({
                    files: [file],
                    title: 'Datos BPM Squad'
                }).catch(console.error);
            } else {
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "BPM_Squad_Data.csv";
                link.click();
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
