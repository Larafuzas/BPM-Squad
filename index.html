<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPM Squad - Monitor de Pulso</title>
    
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="icon.ico">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a4b0be;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; padding: 20px;
        }
        
        /* Controles Globales */
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-add { background-color: #f39c12; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px;}
        .btn-add:hover { background-color: #e67e22; }

        /* Pestañas */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px;}
        .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 10px 20px; border-radius: 8px 8px 0 0; transition: all 0.2s;}
        .tab-btn.active { color: white; background-color: var(--bg-card); font-weight: bold; border-bottom: 3px solid #007bff;}
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Vista Monitor */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background-color: var(--bg-card); border-radius: 12px; padding: 20px; text-align: center; border-top: 4px solid #555; position: relative;}
        .sensor-name { 
            background: transparent; border: 1px dashed #555; color: white; 
            font-size: 20px; font-weight: bold; text-align: center; margin-bottom: 5px; 
            width: 100%; box-sizing: border-box; padding: 5px;
        }
        .sensor-name:focus { border-color: #007bff; outline: none; background: #2a2a2a;}
        .battery-display { color: var(--text-muted); font-size: 14px; margin-bottom: 10px; font-weight: 500;}
        .bpm-display { font-size: 60px; font-weight: bold; margin: 5px 0 15px 0; }
        button.connect-btn { 
            background-color: #007bff; color: white; border: none; padding: 10px 20px; 
            border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; transition: background-color 0.3s;
        }
        button.connect-btn:hover { background-color: #0056b3; }
        .chart-container { position: relative; height: 150px; width: 100%; }

        /* Vista Registro */
        .actions { margin-bottom: 20px; display: flex; gap: 10px;}
        .btn-export { background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;}
        .btn-export.pdf { background-color: #dc3545; }
        .combined-chart-wrapper { background-color: var(--bg-card); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        
        /* Tabla */
        table { width: 100%; border-collapse: collapse; background-color: var(--bg-card); border-radius: 12px; overflow: hidden;}
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #333; }
        th { background-color: #2a2a2a; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="header-controls">
        <div class="tabs" style="margin-bottom: 0; border: none; padding: 0;">
            <button class="tab-btn active" onclick="switchTab('monitor')">📡 Monitor en Vivo</button>
            <button class="tab-btn" onclick="switchTab('registro')">📊 Registro y Exportación</button>
        </div>
        <button class="btn-add" onclick="addSensor()">➕ Añadir Sensor</button>
    </div>

    <div id="monitor" class="tab-content active">
        <div class="grid" id="sensor-grid">
            </div>
    </div>

    <div id="registro" class="tab-content">
        <div class="actions">
            <button class="btn-export pdf" onclick="exportPDF()">📄 Exportar Gráfico a PDF</button>
            <button class="btn-export" onclick="exportCSV()">🧮 Exportar Datos a CSV</button>
        </div>
        
        <div class="combined-chart-wrapper" id="pdf-export-area">
            <h3>Comparativa de Sensores</h3>
            <div style="position: relative; height: 400px; width: 100%;">
                <canvas id="combinedChart"></canvas>
            </div>
        </div>

        <div style="max-height: 400px; overflow-y: auto; border-radius: 12px;">
            <table id="data-table">
                <thead>
                    <tr id="table-header-row">
                        <th>Hora</th>
                        </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- ESTADO GLOBAL Y CONFIGURACIÓN DINÁMICA ---
        const colorPalette = ["#FF5733", "#33A1FF", "#28B463", "#9B59B6", "#F1C40F", "#E67E22", "#E74C3C", "#1ABC9C"];
        let config = []; 
        let activeDevices = [];
        let individualCharts = [];
        let combinedChartObj = null;
        let globalTimeLabels = [];
        let globalData = []; 
        let sensorCount = 0;

        // --- INICIALIZACIÓN ---
        function initApp() {
            const ctxComb = document.getElementById('combinedChart').getContext('2d');
            combinedChartObj = new Chart(ctxComb, {
                type: 'line',
                data: { labels: globalTimeLabels, datasets: [] },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: { y: { suggestedMin: 60, suggestedMax: 180 } }
                }
            });

            addSensor();
            setInterval(recordGlobalData, 1000);
        }

        // --- FUNCIÓN PARA AÑADIR NUEVOS SENSORES ---
        function addSensor() {
            const index = sensorCount;
            const color = colorPalette[index % colorPalette.length];
            const defaultName = `Sensor ${index + 1}`;
            
            config.push({ id: index, name: defaultName, color: color });
            activeDevices.push(null);

            const grid = document.getElementById('sensor-grid');
            const card = document.createElement('div');
            card.className = 'card';
            card.style.borderColor = color;
            card.innerHTML = `
                <input type="text" class="sensor-name" id="name-${index}" value="${defaultName}" onchange="updateNames()">
                <div class="battery-display" id="battery-${index}">🔋 --%</div>
                <div class="bpm-display" id="bpm-${index}" style="color: ${color}">--</div>
                <button class="connect-btn" id="btn-${index}" onclick="connectSensor(${index})">Conectar</button>
                <div class="chart-container">
                    <canvas id="chart-${index}"></canvas>
                </div>
            `;
            grid.appendChild(card);

            const ctx = document.getElementById(`chart-${index}`).getContext('2d');
            individualCharts[index] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{ label: 'BPM', data: [], borderColor: color, borderWidth: 2, tension: 0.4, pointRadius: 0 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    scales: { x: { display: false }, y: { suggestedMin: 60, suggestedMax: 180 } },
                    plugins: { legend: { display: false } }
                }
            });

            combinedChartObj.data.datasets.push({
                label: defaultName, data: [], borderColor: color, borderWidth: 2, tension: 0.4, pointRadius: 1, spanGaps: true
            });
            combinedChartObj.update();

            const trHead = document.getElementById('table-header-row');
            const th = document.createElement('th');
            th.id = `th-${index}`;
            th.innerText = defaultName;
            trHead.appendChild(th);

            sensorCount++;
        }

        // --- LÓGICA BLUETOOTH (CON BATERÍA) ---
        async function connectSensor(index) {
            try {
                const device = await navigator.bluetooth.requestDevice({ 
                    filters: [{ services: ['heart_rate'] }],
                    optionalServices: ['battery_service']
                });
                
                const server = await device.gatt.connect();
                
                const hrService = await server.getPrimaryService('heart_rate');
                const hrCharacteristic = await hrService.getCharacteristic('heart_rate_measurement');
                await hrCharacteristic.startNotifications();
                hrCharacteristic.addEventListener('characteristicvaluechanged', (e) => handleData(e, index));

                try {
                    const batteryService = await server.getPrimaryService('battery_service');
                    const batteryCharacteristic = await batteryService.getCharacteristic('battery_level');
                    
                    const batteryValue = await batteryCharacteristic.readValue();
                    const batteryPercent = batteryValue.getUint8(0);
                    document.getElementById(`battery-${index}`).innerText = `🔋 ${batteryPercent}%`;
                    
                    await batteryCharacteristic.startNotifications();
                    batteryCharacteristic.addEventListener('characteristicvaluechanged', (e) => {
                        const newPercent = e.target.value.getUint8(0);
                        document.getElementById(`battery-${index}`).innerText = `🔋 ${newPercent}%`;
                    });
                } catch (batteryError) {
                    console.log(`Batería no disponible en el sensor ${index}:`, batteryError);
                    document.getElementById(`battery-${index}`).innerText = `🔋 N/A`;
                }

                activeDevices[index] = { device, currentBpm: null };
                
                const btn = document.getElementById(`btn-${index}`);
                btn.style.backgroundColor = "#28a745";
                btn.innerText = "Conectado";

            } catch (error) {
                console.error("Error en la conexión:", error);
                alert("Conexión cancelada o fallida.");
            }
        }

        function handleData(event, index) {
            const value = event.target.value;
            const flags = value.getUint8(0);
            const is16bit = flags & 0x01;
            const bpm = is16bit ? value.getUint16(1, true) : value.getUint8(1);
            
            document.getElementById(`bpm-${index}`).innerText = bpm;
            if(activeDevices[index]) activeDevices[index].currentBpm = bpm;

            const chart = individualCharts[index];
            chart.data.labels.push('');
            chart.data.datasets[0].data.push(bpm);
            if (chart.data.labels.length > 30) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            chart.update();
        }

        function recordGlobalData() {
            if (!activeDevices.some(d => d !== null)) return;

            const timeStr = new Date().toLocaleTimeString();
            let rowBpms = [];
            
            config.forEach((_, i) => {
                const current = (activeDevices[i] && activeDevices[i].currentBpm !== null) ? activeDevices[i].currentBpm : null;
                rowBpms.push(current);
                combinedChartObj.data.datasets[i].data.push(current);
            });

            globalTimeLabels.push(timeStr);
            globalData.push({ time: timeStr, bpm: rowBpms });
            combinedChartObj.update();

            const tbody = document.getElementById('table-body');
            const tr = document.createElement('tr');
            let tdHtml = `<td>${timeStr}</td>`;
            config.forEach((s, i) => {
                tdHtml += `<td style="color:${s.color}">${rowBpms[i] || '-'}</td>`;
            });
            tr.innerHTML = tdHtml;
            tbody.prepend(tr);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function updateNames() {
            config.forEach((_, i) => {
                const newName = document.getElementById(`name-${i}`).value;
                combinedChartObj.data.datasets[i].label = newName;
                document.getElementById(`th-${i}`).innerText = newName;
            });
            combinedChartObj.update();
        }

        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const element = document.getElementById('pdf-export-area');
            const canvas = await html2canvas(element, { backgroundColor: '#1e1e1e' });
            const imgData = canvas.toDataURL('image/png');
            
            const pdf = new jsPDF('landscape', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
            
            pdf.text("Reporte Comparativo de Frecuencia Cardíaca", 10, 10);
            pdf.addImage(imgData, 'PNG', 10, 20, pdfWidth - 20, pdfHeight - 20);
            pdf.save("Grafico_BPM_Squad.pdf");
        }

        function exportCSV() {
            let csvContent = "data:text/csv;charset=utf-8,";
            let headerRow = "Hora";
            config.forEach((_, i) => {
                headerRow += `,${document.getElementById(`name-${i}`).value}`;
            });
            csvContent += headerRow + "\n";

            globalData.forEach(row => {
                let rowStr = row.time;
                config.forEach((_, i) => {
                    rowStr += `,${row.bpm[i] || ''}`;
                });
                csvContent += rowStr + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Datos_BPM_Squad.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = initApp;
    </script>
</body>
</html>
